<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" type="image/x-icon" href="/favicon.ico" />
		<link
			rel="preload"
			href="/fonts/geist/geist-latin.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link
			rel="preload"
			href="/fonts/instrument-serif/instrument-serif-latin-regular.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link
			rel="preload"
			href="/fonts/instrument-serif/instrument-serif-latin-italic.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link rel="preconnect" href="https://spotify.kirkr.xyz" crossorigin="anonymous" />

		<!-- Blocking theme script - prevents flashbang -->
		<script>
			(function () {
				try {
					const stored = localStorage.getItem('theme');
					const theme = stored || 'dark';
					document.documentElement.classList.toggle('dark', theme === 'dark');
				} catch (e) {}
			})();
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
